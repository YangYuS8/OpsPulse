node_id: node-edge-01
server_url: http://127.0.0.1:8090
token: change-me
interval: 15s
docker_enabled: true
service_whitelist:
  - docker
  - caddy
  - ssh
checks:
  - name: caddy-http
    type: http
    target: http://127.0.0.1:8090/healthz
    expected_status: 200
    timeout: 3s
  - name: ssh-tcp
    type: tcp
    target: 127.0.0.1:22
    timeout: 3s
